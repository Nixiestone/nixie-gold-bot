global:
  scrape_interval: 15s

scrape_configs:
  - job_name: tick-ingestion
    static_configs:
      - targets: ["tick-ingestion:8000"]

  - job_name: signal-processor
    static_configs:
      - targets: ["signal-processor:8001"]

  - job_name: order-execution
    static_configs:
      - targets: ["order-execution:8002"]

  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]
