name: build-images

on:
  push:
    branches:
      - claude/trading-infra-architecture-0k877c
      - main
    paths:
      - "services/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASE: ghcr.io/nixiestone/nixie-gold-bot

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [tick-ingestion, signal-processor, order-execution]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/${{ matrix.service }}/requirements.txt pytest

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest -q

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:${{ github.sha }}
